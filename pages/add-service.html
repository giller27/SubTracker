<!-- ДОДАТИ СЕРВІС -->
<div id="add-service" class="page">
    <div class="container">
        <div class="page-header">
            <h1>Додати новий сервіс</h1>
            <p class="subtitle">Відстежуй нові підписки</p>
        </div>

        <!-- Пошук популярних сервісів -->
        <div class="popular-services-section">
            <h2>Популярні сервіси</h2>
            <input type="text" id="popularSearch" placeholder="Пошук Netflix, Spotify, iCloud...">
            <div class="popular-services-grid" id="popularServices"></div>
        </div>

        <!-- Форма для ручного введення -->
        <div class="form-section">
            <h2>або додай власний сервіс</h2>
            <form id="addServiceForm">
                <div class="form-group">
                    <label for="serviceName">Назва сервісу *</label>
                    <input type="text" id="serviceName" placeholder="Netflix, Spotify, iCloud..." required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="servicePrice">Ціна *</label>
                        <input type="number" id="servicePrice" placeholder="10.00" min="0" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="serviceCurrency">Валюта</label>
                        <select id="serviceCurrency">
                            <option value="₴">₴ (UAH)</option>
                            <option value="$">$ (USD)</option>
                            <option value="€">€ (EUR)</option>
                            <option value="£">£ (GBP)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="serviceBillingCycle">Цикл оплати *</label>
                        <select id="serviceBillingCycle" required>
                            <option value="monthly">Щомісячна</option>
                            <option value="yearly">Щорічна</option>
                            <option value="weekly">Щотижнева</option>
                            <option value="quarterly">Щоквартальна</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="serviceCategory">Категорія</label>
                        <select id="serviceCategory">
                            <option value="Стрімінг">Стрімінг</option>
                            <option value="Робота">Робота</option>
                            <option value="Хмарні сховища">Хмарні сховища</option>
                            <option value="Спорт">Спорт</option>
                            <option value="Інше">Інше</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nextBillingDate">Дата наступної оплати *</label>
                    <input type="date" id="nextBillingDate" required>
                </div>

                <div class="form-group">
                    <label for="serviceDescription">Опис (необов'язково)</label>
                    <textarea id="serviceDescription" placeholder="Примітки про цей сервіс..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Додати підписку</button>
                    <button type="reset" class="btn btn-secondary">Очистити</button>
                </div>
            </form>
        </div>
    </div>
</div>
